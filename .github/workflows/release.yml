name: Release

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # The tag is the source of truth for the release version. Write it into
      # both manifests before packaging so the artifact always matches the tag —
      # no pre-release bump commit needed. This only touches the runner's
      # checkout, not the repo.
      - name: Set version from tag
        shell: bash
        run: node scripts/set-version.js "$GITHUB_REF_NAME"

      - name: Install dependencies
        # See ci.yml: native deps are webpack externals and never needed to build
        # the extension, so skip their node-gyp build with --ignore-scripts.
        run: npm install --legacy-peer-deps --ignore-scripts

      # Build steps go through the Makefile so it stays the single source of
      # truth (install is the exception — CI needs --ignore-scripts above).
      # `make package` builds first, so no separate build step is needed.
      - name: Lint (type-check)
        run: make lint

      - name: Test
        run: make test

      - name: Package
        run: make package

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: vortex-gta5.zip
          generate_release_notes: true
