name: Release

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Install dependencies
        # See ci.yml: native deps are webpack externals and never needed to build
        # the extension, so skip their node-gyp build with --ignore-scripts.
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Lint (type-check)
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package
        run: npm run package

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: vortex-gta5.zip
          generate_release_notes: true
