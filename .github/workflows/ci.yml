name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  build:
    # winapi-bindings / turbowalk are Windows-native; build on Windows to match
    # the dev environment and the .zip packaging path.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint (type-check)
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
