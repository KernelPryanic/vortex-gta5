name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  build:
    # winapi-bindings / turbowalk are Windows-native; build on Windows to match
    # the dev environment and the .zip packaging path.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips the native build of winapi-bindings / turbowalk.
        # They're webpack `externals` (provided by the Vortex host at runtime) and
        # winapi-bindings is require()d lazily, so CI never needs the compiled
        # binaries to typecheck, test, or build — and node-gyp can't reliably find
        # the C++ toolchain on the runner anyway.
        run: npm install --legacy-peer-deps --ignore-scripts

      # Build steps go through the Makefile so it stays the single source of
      # truth (install is the exception — CI needs --ignore-scripts above).
      - name: Lint (type-check)
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build
